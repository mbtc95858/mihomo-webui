<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihomo WebUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .editor-container {
            height: 70vh;
        }
        #configEditor {
            height: 100%;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-light">
    <div class="toast-container" id="toastContainer"></div>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <span class="fw-bold">Mihomo WebUI</span>
            </a>
            <div class="ms-auto">
                <button class="btn btn-light me-2" id="saveBtn">
                    <span class="me-1">💾</span> 保存配置
                </button>
                <button class="btn btn-warning" id="restartBtn">
                    <span class="me-1">🔄</span> 重启服务
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">config.yaml</h5>
                        <button class="btn btn-sm btn-outline-secondary" id="loadBtn">
                            <span class="me-1">📥</span> 重新加载
                        </button>
                    </div>
                    <div class="card-body p-0 editor-container">
                        <textarea class="form-control border-0 rounded-0" id="configEditor" spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-white">
                        <h6 class="mb-0">📋 快捷操作</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary" id="backupBtn">
                                备份当前配置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-white">
                        <h6 class="mb-0">💡 使用说明</h6>
                    </div>
                    <div class="card-body">
                        <ul class="mb-0">
                            <li>编辑配置后点击「保存配置」按钮保存</li>
                            <li>保存后点击「重启服务」使配置生效</li>
                            <li>保存前会自动备份原配置到 config.yaml.backup</li>
                            <li>修改配置前建议先备份</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let originalConfig = '';

        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toastContainer');
            const toastId = 'toast-' + Date.now();
            const bgClass = type === 'success' ? 'bg-success' : type === 'error' ? 'bg-danger' : 'bg-warning';
            
            toastContainer.innerHTML += `
                <div id="${toastId}" class="toast ${bgClass} text-white" role="alert">
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;
            
            const toast = new bootstrap.Toast(document.getElementById(toastId));
            toast.show();
            
            setTimeout(() => {
                const el = document.getElementById(toastId);
                if (el) el.remove();
            }, 5000);
        }

        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('configEditor').value = data.config;
                    originalConfig = data.config;
                    showToast('配置加载成功');
                } else {
                    showToast('加载失败: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('加载失败: ' + error.message, 'error');
            }
        }

        async function saveConfig() {
            const config = document.getElementById('configEditor').value;
            
            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ config })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    originalConfig = config;
                    showToast(data.message);
                } else {
                    showToast('保存失败: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        async function restartService() {
            if (!confirm('确定要重启 Mihomo 服务吗？')) {
                return;
            }
            
            try {
                const response = await fetch('/api/restart', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('重启失败: ' + error.message, 'error');
            }
        }

        document.getElementById('loadBtn').addEventListener('click', loadConfig);
        document.getElementById('saveBtn').addEventListener('click', saveConfig);
        document.getElementById('restartBtn').addEventListener('click', restartService);
        document.getElementById('backupBtn').addEventListener('click', () => {
            showToast('每次保存时会自动备份到 config.yaml.backup', 'warning');
        });

        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
